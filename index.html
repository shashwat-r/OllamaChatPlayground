<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ========================= -->
  <!-- DOCUMENT METADATA -->
  <!-- ========================= -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Ollama Chat Playground</title>

  <!-- ========================= -->
  <!-- STYLES -->
  <!-- ========================= -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ========================= -->
  <!-- APP SHELL -->
  <!-- ========================= -->
  <div class="app-shell">
    <!-- ========================= -->
    <!-- GLOBAL TITLE BAR -->
    <!-- ========================= -->
    <div class="title-bar">
      <div class="title-bar-brand">
        <img src="favicon.png" alt="Ollama Chat Playground Icon" class="title-icon" />
        <span>Ollama Chat Playground</span>
      </div>
    </div>

    <!-- ========================= -->
    <!-- CONTENT SHELL -->
    <!-- ========================= -->
    <div class="content-shell">
      <!-- ========================= -->
      <!-- SETTINGS RAIL -->
      <!-- ========================= -->
      <div class="settings-rail">
        <button
          id="sidebarToggleBtn"
          class="icon-btn"
          type="button"
          title="Collapse or expand settings"
        >
          ⚙
        </button>
      </div>

      <!-- ========================= -->
      <!-- SETTINGS SIDEBAR -->
      <!-- ========================= -->
      <aside id="settingsSidebar" class="settings-sidebar">
        <!-- SETTINGS PANEL -->
        <div class="settings-panel">
          <!-- SETTINGS TITLE -->
          <div class="settings-title">Settings</div>

          <!-- MODEL INPUT -->
          <div class="settings-group">
            <div class="label-row">
              <label for="model">Model</label>
              <button
                id="pullModelBtn"
                class="icon-btn"
                type="button"
                title="Pull model"
                aria-label="Pull model"
              >
                ↓
              </button>
            </div>
            <input id="model" type="text" placeholder="Specify model" />
          </div>

          <!-- INSTALLED MODELS -->
          <div class="settings-group">
            <div class="label-row">
              <label id="installedModelsLabel" for="modelDropdown">Installed Models (0)</label>
              <button
                id="refreshModelsBtn"
                class="icon-btn"
                type="button"
                title="Refresh models"
                aria-label="Refresh models"
              >
                ↻
              </button>
            </div>

            <select id="modelDropdown" title="Select model">
              <option value="" disabled selected>Select model</option>
            </select>
          </div>

          <!-- CONNECTION SETTINGS -->
          <div class="settings-group">
            <label for="host">Ollama Host</label>
            <input id="host" type="text" value="http://localhost:11434" />
          </div>

          <div class="settings-group">
            <label for="apiPath">API Path</label>
            <input id="apiPath" type="text" value="/api/chat" />
          </div>

          <!-- REQUEST OPTIONS -->
          <div class="settings-group">
            <label class="toggle-wrap">
              <input id="thinkToggle" type="checkbox" />
              <span>Request Thinking</span>
            </label>
          </div>

          <div class="settings-group">
            <label class="toggle-wrap">
              <input id="streamToggle" type="checkbox" checked />
              <span>Stream Response</span>
            </label>
          </div>

          <!-- SETTINGS NOTE -->
          <div class="settings-note muted">
            Thinking and streaming preferences are reused for future replies.
          </div>
        </div>
      </aside>

      <!-- SIDEBAR RESIZE HANDLE -->
      <div id="sidebarResizeHandle" class="sidebar-resize-handle" title="Drag to resize settings panel"></div>

      <!-- ========================= -->
      <!-- MAIN PANE -->
      <!-- ========================= -->
      <main class="main-pane">
        <!-- CHAT AREA -->
        <div id="chat" class="chat-wrap">
          <!-- EMPTY STATE -->
          <div id="emptyState" class="empty-state">
            <img src="favicon.png" alt="Ollama Chat Playground Icon" class="empty-icon" />
            <div class="empty-text">
              Welcome to Ollama Chat Playground 👋
            </div>
          </div>
        </div>

        <!-- COMPOSER RESIZE HANDLE -->
        <div id="composerResizeHandle" class="composer-resize-handle" title="Drag to resize chat composer"></div>

        <!-- MESSAGE COMPOSER -->
        <div id="composer" class="composer">
          <!-- PROMPT REGION -->
          <div class="composer-prompt-region">
            <!-- INPUT AREA -->
            <div class="input-wrap">
              <textarea id="prompt" placeholder="Write your message in markdown..."></textarea>
            </div>
          </div>

          <!-- FIXED FOOTER REGION -->
          <div class="composer-footer-region">
            <div class="muted">Enter to send. Shift+Enter for new line.</div>

            <!-- COMPOSER ACTIONS -->
            <div class="composer-actions">
              <button id="clearBtn" class="action">Clear</button>
              <button id="sendBtn" class="action primary">Send</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- ========================= -->
  <!-- EXTERNAL LIBRARIES -->
  <!-- ========================= -->
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>

  <!-- ========================= -->
  <!-- SCRIPT -->
  <!-- ========================= -->
  <script src="script.js"></script>
</body>
</html>
